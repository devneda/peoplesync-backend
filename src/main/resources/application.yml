spring:
  application:
    name: peoplesync-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/peoplesync_db
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

logging:
  file:
    name: logs/peoplesync-backend.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com.peoplesync.api: DEBUG

security:
  jwt:
    # TODO este token debe ir en el fichero .env cuando se lance a prod
    secret-key: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    expiration: 86400000 # El token caduca en 1 día